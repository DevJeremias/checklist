<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checklist Amazon Gelo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --border: #333; }
        body { font-family: -apple-system, Helvetica, sans-serif; background: #f4f4f9; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .card { background: #fff; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .item:last-child { border-bottom: none; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .nome { font-weight: bold; font-size: 16px; color: #333; }
        .btns { display: flex; gap: 10px; }
        input[type="radio"] { display: none; }
        .label-btn { width: 50px; height: 50px; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .ok-input:checked + .label-btn { background: var(--green); color: white; border-color: var(--green); }
        .x-input:checked + .label-btn { background: var(--red); color: white; border-color: var(--red); }
        .txt-area { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; display: none; box-sizing: border-box; margin-top: 5px; font-size: 16px; }
        .btn-final { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .btn-clear { width: 100%; padding: 10px; background: #666; color: white; border: none; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <strong>Checklist Máquinas</strong>
    <span id="dt"></span>
</div>

<div class="card" id="lista"></div>

<button class="btn-final" onclick="gerarPDF()">BAIXAR PDF</button>
<button class="btn-clear" onclick="location.reload()">LIMPAR TUDO</button>

<script>
    const maquinas = ["Cubo Grande", "Cubo Pequena 1", "Cubo Pequena 2", "Escama SABROE", "Escama MADEF NOVO", "Escama MADEF GRANDE", "Escama MADEF PEQUENO"];
    const d = new Date();
    document.getElementById('dt').innerText = d.toLocaleDateString('pt-BR');

    const container = document.getElementById('lista');
    maquinas.forEach((m, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="top-row">
                <span class="nome">Máquina - ${m}</span>
                <div class="btns">
                    <label><input type="radio" name="r${i}" class="ok-input" onclick="sh(${i},0)"> <div class="label-btn">✓</div></label>
                    <label><input type="radio" name="r${i}" class="x-input" onclick="sh(${i},1)"> <div class="label-btn">✕</div></label>
                </div>
            </div>
            <input type="text" id="t${i}" class="txt-area" placeholder="Justificativa...">
        `;
        container.appendChild(div);
    });

    function sh(i, s) { document.getElementById(`t${i}`).style.display = s ? 'block' : 'none'; }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatório de Máquinas", 14, 20);
        doc.text(`Data: ${d.toLocaleDateString('pt-BR')}`, 14, 30);
        
        const rows = maquinas.map((m, i) => {
            const ok = document.getElementsByName(`r${i}`)[0].checked;
            const x = document.getElementsByName(`r${i}`)[1].checked;
            const obs = document.getElementById(`t${i}`).value;
            return [m, ok ? "OK" : (x ? "PARADA" : "-"), obs || "-"];
        });

        doc.autoTable({ startY: 40, head: [['Máquina', 'Status', 'Obs']], body: rows });
        doc.save(`${d.toISOString().split('T')[0]} check-list maquinas.pdf`);
    }
</script>
</body>
</html>
